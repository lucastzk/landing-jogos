name: Deploy para o VPS

# "Mudou aqui → muda lá": a cada push na branch main, atualiza o VPS sozinho.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Roda UM deploy de cada vez (fila). Evita que pushes em sequência disparem
# deploys simultâneos que se atropelam no VPS (travas de git/npm/pm2 = falha).
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Atualizar o VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          # Autenticação por SENHA (secret VPS_PASSWORD) — uma linha só, não
          # corrompe como a chave SSH multi-linha. Defina VPS_PASSWORD no GitHub.
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_PATH }}
            ./deploy.sh
