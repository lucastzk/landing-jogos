name: Deploy para o VPS

# "Mudou aqui → muda lá": a cada push na branch main, atualiza o VPS sozinho.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Roda UM deploy de cada vez (fila). Evita que pushes em sequência disparem
# deploys simultâneos que se atropelam no VPS (travas de git/npm/pm2 = falha).
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Atualizar o VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          # Autenticação por SENHA (secret VPS_PASSWORD) — uma linha só, não
          # corrompe como a chave SSH multi-linha. Defina VPS_PASSWORD no GitHub.
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          # Fire-and-forget: o build/restart do app, por dentro do SSH, segura a
          # sessão aberta e o Action marca vermelho mesmo dando certo. Solução:
          # disparar o deploy 100% em BACKGROUND (nohup, desacoplado) e fechar a
          # sessão na hora → o Action recebe exit 0 (VERDE de verdade). O `flock`
          # serializa (um deploy por vez). O resultado fica em `deploy.log` no VPS.
          script: |
            cd ${{ secrets.VPS_PATH }}
            git fetch origin main && git reset --hard origin/main
            nohup bash -lc 'flock /tmp/landing-deploy.lock ./deploy.sh' >> deploy.log 2>&1 < /dev/null &
            disown || true
            sleep 2
            echo "Deploy disparado em background (veja deploy.log no VPS)."
