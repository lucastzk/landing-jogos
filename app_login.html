<!doctype html>
<html lang="en">
	<head>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
			rel="stylesheet"
		/>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>403</title>
		<link rel="stylesheet" href="/_codes/styles.css" />
	</head>
	<body data-page="error" data-status="403">
		<div class="simple-page container">
			<div id="company-logo"></div>
			<div class="icon-circle" aria-hidden="true">!</div>
			<div class="status-code">HTTP <span id="code">403</span></div>
			<h1 id="title"></h1>
			<p class="description" id="description"></p>
			<div
				class="timer-bar-wrap"
				id="progress-bar"
				role="progressbar"
				aria-valuemin="0"
				aria-valuemax="30"
				aria-valuenow="30"
			>
				<div class="timer-bar" id="timer-bar"></div>
			</div>
			<p class="timer-label" id="timer-label"></p>
			<p class="redirect-message" id="redirect-note"></p>
			<button class="button" id="action-button" type="button"></button>
			<small class="support-message" id="support-message"></small>
			<small class="support-message" id="request-id"></small>
			<small class="support-message" id="viewer-ip"></small>
		</div>
		<script src="/_codes/page.js"></script>
	</body>
</html>
